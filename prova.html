<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Avaliação em Andamento - SENAI</title>
    <script src="banco.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --azul: #0054a6; --vermelho: #ed1c24; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        header { background: var(--azul); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--vermelho); font-weight: bold; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .questao { border-bottom: 1px solid #eee; padding: 15px 0; }
        .questao p { font-weight: bold; }
        label { display: block; margin: 10px 0; cursor: pointer; }
        .btn-finalizar { background: var(--azul); color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<header>PORTAL DE AVALIAÇÕES - SENAI RJ</header>

<div class="container">
    <div id="info-aluno" style="margin-bottom: 20px; color: #666;"></div>
    <hr>
    <form id="form-prova">
        <div id="prova-container">
            </div>
        <button type="button" class="btn-finalizar" onclick="finalizarProva()">FINALIZAR E ENVIAR</button>
    </form>
</div>

<script>
    // Pega os dados do aluno que foram salvos no index.html
    const nome = localStorage.getItem("nome");
    const matricula = localStorage.getItem("matricula");

    if (!nome) {
        alert("Por favor, identifique-se primeiro.");
        window.location.href = "index.html";
    } else {
        document.getElementById('info-aluno').innerText = "Aluno: " + nome + " | Matrícula: " + matricula;
    }

    // FUNÇÃO PARA CARREGAR AS QUESTÕES DO BANCO.JS
    function carregarQuestoes() {
        const container = document.getElementById('prova-container');

        // Verifica se o BANCO_DADOS existe no banco.js
        if (typeof BANCO_DADOS !== 'undefined') {
            BANCO_DADOS.questoes.forEach((q, i) => {
                let htmlQuestao = `
                    <div class="questao">
                        <p>${i + 1}) ${q.pergunta}</p>
                `;
                
                q.opcoes.forEach((opcao, index) => {
                    const letra = String.fromCharCode(65 + index);
                    htmlQuestao += `
                        <label>
                            <input type="radio" name="q${i}" value="${letra}" required> 
                            ${letra}) ${opcao}
                        </label>
                    `;
                });

                htmlQuestao += `</div>`;
                container.innerHTML += htmlQuestao;
            });
        } else {
            container.innerHTML = "<p style='color:red'>ERRO: O arquivo banco.js está vazio ou não foi configurado corretamente no Admin.</p>";
        }
    }

    // Inicia a renderização
    carregarQuestoes();

    function finalizarProva() {
        // Lógica de envio (EmailJS) aqui
        alert("Enviando avaliação...");
        // Adicione seu código de envio aqui
    }
</script>
</body>
</html>
