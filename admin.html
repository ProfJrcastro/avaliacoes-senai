<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo - Professor</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #e9ecef; }
        .box { background: white; padding: 20px; border-radius: 8px; max-width: 600px; margin: auto; }
        textarea { width: 100%; height: 60px; }
        .q-box { border: 1px solid #ddd; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Configurações do Professor</h2>
        <input type="email" id="email-prof" placeholder="E-mail para receber as notas">
        <button onclick="salvarConfig()">Salvar E-mail</button>
        
        <hr>
        <h3>Cadastrar Questão</h3>
        <textarea id="pergunta" placeholder="Enunciado da questão"></textarea>
        <input type="text" id="optA" placeholder="Opção A">
        <input type="text" id="optB" placeholder="Opção B">
        <input type="text" id="optC" placeholder="Opção C">
        <input type="text" id="optD" placeholder="Opção D">
        <input type="text" id="optE" placeholder="Opção E">
        <select id="correta">
            <option value="A">Correta: A</option>
            <option value="B">Correta: B</option>
            <option value="C">Correta: C</option>
            <option value="D">Correta: D</option>
            <option value="E">Correta: E</option>
        </select>
        <button onclick="adicionarQuestao()">Adicionar Questão</button>
        <div id="lista-questoes"></div>
    </div>

    <script>
        function salvarConfig() {
            localStorage.setItem('emailProfessor', document.getElementById('email-prof').value);
            alert("E-mail salvo com sucesso!");
        }

        function adicionarQuestao() {
            let questoes = JSON.parse(localStorage.getItem('questoes') || "[]");
            const nova = {
                pergunta: document.getElementById('pergunta').value,
                opcoes: [
                    document.getElementById('optA').value,
                    document.getElementById('optB').value,
                    document.getElementById('optC').value,
                    document.getElementById('optD').value,
                    document.getElementById('optE').value
                ],
                correta: document.getElementById('correta').value
            };
            questoes.push(nova);
            localStorage.setItem('questoes', JSON.stringify(questoes));
            alert("Questão adicionada!");
            location.reload();
        }
    </script>
</body>
</html>
